server:
  port: ${SERVER_PORT:8000}

spring:
  application:
    name: bilibrain
  autoconfigure:
    exclude:
      - com.alibaba.cloud.ai.autoconfigure.dashscope.DashScopeAgentAutoConfiguration
      - com.alibaba.cloud.ai.autoconfigure.dashscope.DashScopeAsyncToolCallingManagerAutoConfiguration
      - com.alibaba.cloud.ai.autoconfigure.dashscope.DashScopeAudioSpeechAutoConfiguration
      - com.alibaba.cloud.ai.autoconfigure.dashscope.DashScopeImageAutoConfiguration
      - com.alibaba.cloud.ai.autoconfigure.dashscope.DashScopeRerankAutoConfiguration
      - com.alibaba.cloud.ai.autoconfigure.dashscope.DashScopeVideoAutoConfiguration
      - org.springframework.ai.vectorstore.milvus.autoconfigure.MilvusVectorStoreAutoConfiguration
  ai:
    model:
      chat: ${SPRING_AI_MODEL_CHAT:dashscope}
      embedding: ${SPRING_AI_MODEL_EMBEDDING:none}
      audio:
        speech: ${SPRING_AI_MODEL_AUDIO_SPEECH:none}
        transcription: ${SPRING_AI_MODEL_AUDIO_TRANSCRIPTION:none}
    dashscope:
      api-key: ${DASHSCOPE_API_KEY:}
      chat:
        enabled: ${DASHSCOPE_CHAT_ENABLED:false}
        options:
          model: ${DASHSCOPE_CHAT_MODEL:qwen3.5-plus}
      embedding:
        options:
          model: ${DASHSCOPE_EMBEDDING_MODEL:text-embedding-v4}
          dimensions: ${DASHSCOPE_EMBEDDING_DIMENSIONS:1024}
      audio:
        transcription:
          options:
            model: ${DASHSCOPE_TRANSCRIPTION_MODEL:paraformer-v2}
    vectorstore:
      milvus:
        client:
          host: ${MILVUS_HOST:localhost}
          port: ${MILVUS_PORT:19530}
          uri: ${MILVUS_URI:}
          token: ${MILVUS_TOKEN:}
          username: ${MILVUS_USERNAME:}
          password: ${MILVUS_PASSWORD:}
          secure: ${MILVUS_SECURE:false}
          connect-timeout-ms: ${MILVUS_CONNECT_TIMEOUT_MS:10000}
          keep-alive-time-ms: ${MILVUS_KEEP_ALIVE_TIME_MS:55000}
          keep-alive-timeout-ms: ${MILVUS_KEEP_ALIVE_TIMEOUT_MS:20000}
          idle-timeout-ms: ${MILVUS_IDLE_TIMEOUT_MS:0}
          rpc-deadline-ms: ${MILVUS_RPC_DEADLINE_MS:0}
        database-name: ${MILVUS_DATABASE:default}
        collection-name: ${MILVUS_COLLECTION:bilibrain_transcript_chunks}
        embedding-dimension: ${MILVUS_EMBEDDING_DIMENSION:1024}
        index-type: ${MILVUS_INDEX_TYPE:IVF_FLAT}
        metric-type: ${MILVUS_METRIC_TYPE:COSINE}
        index-parameters: ${MILVUS_INDEX_PARAMETERS:{"nlist":1024}}
        initialize-schema: ${MILVUS_INITIALIZE_SCHEMA:true}
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:bilibrain}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: always
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

app:
  cors:
    allowed-origins:
      - http://localhost:5173
      - http://127.0.0.1:5173
      - http://localhost:4173
      - http://127.0.0.1:4173
  catalog:
    folder-list-cache-ttl-seconds: ${FOLDER_LIST_CACHE_TTL_SECONDS:300}
    folder-videos-cache-ttl-seconds: ${FOLDER_VIDEOS_CACHE_TTL_SECONDS:300}
  bilibili:
    uid: ${BILIBILI_UID:0}
    sessdata: ${BILIBILI_SESSDATA:}
    bili-jct: ${BILIBILI_BILI_JCT:}
    dede-user-id: ${BILIBILI_DEDE_USER_ID:}
    session-cache-ttl-seconds: ${BILIBILI_SESSION_CACHE_TTL_SECONDS:30}
    http-timeout-seconds: ${BILIBILI_HTTP_TIMEOUT_SECONDS:15}
    http-retries: ${BILIBILI_HTTP_RETRIES:2}
    http-retry-backoff-millis: ${BILIBILI_HTTP_RETRY_BACKOFF_MILLIS:300}
  processing:
    max-video-minutes: ${DEFAULT_MAX_VIDEO_MINUTES:30}
    ingestion-max-concurrency: ${INGESTION_MAX_CONCURRENCY:3}
    ingestion-poll-interval-seconds: ${INGESTION_POLL_INTERVAL_SECONDS:2}
    ingestion-task-stale-after-seconds: ${INGESTION_TASK_STALE_AFTER_SECONDS:1800}
    asr-chunk-concurrency: ${ASR_CHUNK_CONCURRENCY:2}
    asr-target-chunk-seconds: ${ASR_TARGET_CHUNK_SECONDS:180}
    asr-chunk-seconds: ${ASR_CHUNK_SECONDS:240}
    asr-chunk-overlap-seconds: ${ASR_CHUNK_OVERLAP_SECONDS:8}
    asr-silence-noise-db: ${ASR_SILENCE_NOISE_DB:-35}
    asr-silence-min-seconds: ${ASR_SILENCE_MIN_SECONDS:0.6}
    asr-language-hints: ${ASR_LANGUAGE_HINTS:zh}
    asr-api-base-url: ${ASR_API_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
    asr-api-model: ${ASR_API_MODEL:qwen3-asr-flash}
    asr-enable-itn: ${ASR_ENABLE_ITN:false}
    asr-api-timeout-seconds: ${ASR_API_TIMEOUT_SECONDS:90}
    asr-api-retries: ${ASR_API_RETRIES:2}
    asr-api-retry-backoff-millis: ${ASR_API_RETRY_BACKOFF_MILLIS:1000}
    ffmpeg-command: ${FFMPEG_COMMAND:ffmpeg}
    ffprobe-command: ${FFPROBE_COMMAND:ffprobe}
  retrieval:
    enabled: ${VECTOR_STORE_ENABLED:false}
    chunk-size: ${RETRIEVAL_CHUNK_SIZE:500}
    chunk-overlap: ${RETRIEVAL_CHUNK_OVERLAP:100}
    search-top-k: ${RETRIEVAL_SEARCH_TOP_K:5}
  summary:
    direct-max-characters: ${SUMMARY_DIRECT_MAX_CHARACTERS:4000}
    window-max-characters: ${SUMMARY_WINDOW_MAX_CHARACTERS:3000}
    window-overlap-characters: ${SUMMARY_WINDOW_OVERLAP_CHARACTERS:300}
    window-concurrency: ${SUMMARY_WINDOW_CONCURRENCY:4}
    temperature: ${SUMMARY_TEMPERATURE:0.2}
  chat:
    compaction-token-threshold: ${CHAT_COMPACTION_TOKEN_THRESHOLD:1200}
    recent-message-limit: ${CHAT_RECENT_MESSAGE_LIMIT:6}
    memory-max-characters: ${CHAT_MEMORY_MAX_CHARACTERS:4000}
    memory-line-max-characters: ${CHAT_MEMORY_LINE_MAX_CHARACTERS:180}
  storage:
    data-dir: ${DATA_DIR:./data}
    audio-dir: ${AUDIO_DIR:./data/audio}
    vector-db-dir: ${VECTOR_DB_DIR:./data/vector_db}
    upload-dir: ${UPLOAD_DIR:./uploads}
    tools-workspace-root: ${TOOLS_WORKSPACE_ROOT:./data/tool_workspaces}
    skills-root: ${SKILLS_ROOT:./skills}

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

logging:
  level:
    com.bin.bilibrain: INFO
    com.bin.bilibrain.mapper: WARN
    org.apache.ibatis: WARN
    com.baomidou.mybatisplus: WARN
