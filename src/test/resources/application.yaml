server:
  port: 0

spring:
  sql:
    init:
      mode: always

app:
  catalog:
    folder-list-cache-ttl-seconds: 300
    folder-videos-cache-ttl-seconds: 300
  processing:
    max-video-minutes: 30
    subtitle-first-enabled: false
  storage:
    data-dir: ./target/test-data
    audio-dir: ./target/test-data/audio
    vector-db-dir: ./target/test-data/vector_db
    upload-dir: ./target/test-data/uploads
    tools-workspace-root: ./target/test-data/tool_workspaces
    skills-root: ./target/test-data/skills

logging:
  level:
    root: WARN
    com.bin.bilibrain: WARN
