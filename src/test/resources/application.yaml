server:
  port: 0

spring:
  autoconfigure:
    exclude:
      - com.alibaba.cloud.ai.autoconfigure.dashscope.DashScopeAgentAutoConfiguration
      - com.alibaba.cloud.ai.autoconfigure.dashscope.DashScopeAsyncToolCallingManagerAutoConfiguration
      - com.alibaba.cloud.ai.autoconfigure.dashscope.DashScopeAudioSpeechAutoConfiguration
      - com.alibaba.cloud.ai.autoconfigure.dashscope.DashScopeChatAutoConfiguration
      - com.alibaba.cloud.ai.autoconfigure.dashscope.DashScopeEmbeddingAutoConfiguration
      - com.alibaba.cloud.ai.autoconfigure.dashscope.DashScopeImageAutoConfiguration
      - com.alibaba.cloud.ai.autoconfigure.dashscope.DashScopeRerankAutoConfiguration
      - com.alibaba.cloud.ai.autoconfigure.dashscope.DashScopeVideoAutoConfiguration
  ai:
    model:
      chat: dashscope
      embedding: none
      audio:
        speech: none
        transcription: none
    dashscope:
      chat:
        enabled: false
  sql:
    init:
      mode: always

app:
  catalog:
    folder-list-cache-ttl-seconds: 300
    folder-videos-cache-ttl-seconds: 300
  processing:
    max-video-minutes: 30
  summary:
    direct-max-characters: 500
    window-max-characters: 500
    window-overlap-characters: 50
    temperature: 0.2
  chat:
    compaction-token-threshold: 120
    recent-message-limit: 4
    memory-max-characters: 1200
    memory-line-max-characters: 80
  storage:
    data-dir: ./target/test-data
    audio-dir: ./target/test-data/audio
    vector-db-dir: ./target/test-data/vector_db
    upload-dir: ./target/test-data/uploads
    tools-workspace-root: ./target/test-data/tool_workspaces
    skills-root: ./target/test-data/skills

logging:
  level:
    root: WARN
    com.bin.bilibrain: WARN
